# Pre-merge checks. The full `npm run typecheck` needs a local Foundry
# install (see tools/symlink.js), so CI runs the checks that work in a bare
# checkout: lint, the system build, and the types-package build — the same
# commands the release workflows depend on.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js version 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dev dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build system
        run: npm run build

      - name: Build type declarations
        run: npm run build:types
