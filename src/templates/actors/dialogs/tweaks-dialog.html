<div class="standard-form">
  <div class="form-group">
    <label for="spellcaster">{{localize "OSE.Spellcaster"}}</label>
    <input type="checkbox" name="system.spells.enabled" id="spellcaster" {{checked @root.system.spells.enabled}}
      data-dtype="Boolean" />
  </div>
  <div class="form-group">
    <label for="retainer">{{localize "OSE.Retainer"}}</label>
    <input type="checkbox" name="system.retainer.enabled" id="retainer" {{checked @root.system.retainer.enabled}}
      data-dtype="Boolean" />
  </div>
  <div class="form-group">
    <label for="ignoreBonusDamage">{{localize "OSE.Tweaks.DontApplyWeaponBonusToDamageRoll"}}</label>
    <input type="checkbox" name="system.config.ignoreBonusDamage" id="ignoreBonusDamage" {{checked system.config.ignoreBonusDamage}}
      data-dtype="Boolean" />
  </div>
  <div class="form-group">
    <label for="initiative">{{localize "OSE.InitiativeBonus"}}</label>
    <input type="text" name="system.initiative.mod" id="initiative" value="{{@root.system.initiative.mod}}"
      data-dtype="Number" />
  </div>
  {{#if (eq this.type 'character')}}
  <div class="form-group">
    <label for="experiencenext">{{localize "OSE.details.experience.next"}}</label>
    <input type="text" name="system.details.xp.next" id="experiencenext" value="{{@root.system.details.xp.next}}"
      data-dtype="Number" />
  </div>
  <div class="form-group">
    <label for="experience">{{localize "OSE.details.experience.bonus"}} (%)</label>
    <input type="text" name="system.details.xp.bonus" id="experience" value="{{@root.system.details.xp.bonus}}"
      data-dtype="Number" />
  </div>
  <div class="form-group">
    <label for="experience-share">{{localize "OSE.details.experience.share"}} (%)</label>
    <input type="text" name="system.details.xp.share" id="experience-share" value="{{@root.system.details.xp.share}}"
      data-dtype="Number" />
  </div>
  <div class="form-group">
    <label for="magic">{{localize "OSE.details.magic.bonus"}}</label>
    <input type="text" name="system.details.magic.bonus" id="magic" value="{{@root.system.details.magic.bonus}}"
      data-dtype="Number" />
  </div>
  <div class="form-group">
    <label for="melee">{{localize "OSE.MeleeBonus"}}</label>
    <input type="text" name="system.thac0.mod.melee" id="melee" value="{{@root.system.thac0.mod.melee}}"
      data-dtype="Number" />
  </div>
  <div class="form-group">
    <label for="missile">{{localize "OSE.MissileBonus"}}</label>
    <input type="text" name="system.thac0.mod.missile" id="missile" value="{{@root.system.thac0.mod.missile}}"
      data-dtype="Number" />
  </div>
  <div class="form-group">
    <label for="ac">{{localize "OSE.ArmorClassBonus"}}</label>
    {{#if config.ascendingAC}}
    <input type="text" name="system.aac.mod" id="ac" value="{{@root.system.aac.mod}}" data-dtype="Number" />
    {{else}}
    <input type="text" name="system.ac.mod" id="ac" value="{{@root.system.ac.mod}}" data-dtype="Number" />
    {{/if}}
  </div>
  <div class="form-group">
    <label for="encumbrance">{{localize "OSE.Encumbrance"}}</label>
    <input type="text" name="system.encumbrance.max" id="encumbrance" value="{{@root.system.encumbrance.max}}"
      data-dtype="Number" {{#unless user.isGM}}disabled{{/unless}} />
  </div>
  <div class="form-group">
    <label for="movementAuto">{{localize "OSE.Setting.MovementAuto"}}</label>
    <input type="checkbox" name="system.config.movementAuto" id="movementAuto" {{checked system.config.movementAuto}}
      data-dtype="Boolean" {{#unless user.isGM}}disabled{{/unless}} />
  </div>
  {{else}}
  <div class="form-group">
    <label for="enableInventory">{{localize "OSE.Setting.EnableInventory"}}</label>
    <input type="checkbox" name="system.config.enableInventory" id="enableInventory" {{checked system.config.enableInventory}}
      data-dtype="Boolean" {{#unless user.isGM}}disabled{{/unless}} />
  </div>
  {{/if}}
  <footer class="sheet-footer">
    <button type="submit">
      <i class="fas fa-save"></i>{{localize "Save Changes"}}
    </button>
  </footer>
</div>
