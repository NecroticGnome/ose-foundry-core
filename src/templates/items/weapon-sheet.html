<div class="item-sheet-content">
  <header class="sheet-header">
    <img class="profile-img" src="{{img}}" data-edit="img" data-tooltip="{{name}}" />
    <div class="header-col">
      <h1 class="charname">
        <input name="name" type="text" value="{{name}}" placeholder="Name" />
      </h1>
      <ol class="tag-list">
        {{#each @root.system.tags as |tag|}}
        <li class="tag" data-tooltip="{{tag.title}}" data-tag="{{tag.value}}">
          <span>{{tag.value}}</span>
          <a class="tag-delete" data-action="tagDelete"><i class="fas fa-times"></i></a>
        </li>
        {{/each}}
      </ol>
    </div>
  </header>
  <section class="sheet-body">
    <div class="flexrow">
      <div class="stats">
        <div class="form-group">
          <div class="form-fields">
            <input
              type="text"
              data-action="add-tag"
              data-tooltip="OSE.items.typeTag"
              placeholder="{{localize 'OSE.items.enterTag'}}"
            />
          </div>
        </div>
        <label class="form-group block-input">
          <span class="form-label">{{localize 'OSE.items.Damage'}}</span>
          <div class="form-fields">
            <input
              type="text"
              name="system.damage"
              value="{{system.damage}}"
              data-dtype="String"
            />
          </div>
        </label>
        <label class="form-group">
          <span class="form-label" data-tooltip="OSE.items.AtkBonus"
            >{{localize 'OSE.items.Bonus'}}</span
          >
          <div class="form-fields">
            <input
              type="text"
              name="system.bonus"
              value="{{system.bonus}}"
              data-dtype="Number"
            />
          </div>
        </label>
        <div class="form-group attack-type">
          <a
            data-tooltip="OSE.items.Melee"
            data-action="meleeToggle"
            class="melee-toggle {{#if system.melee}}active{{/if}}"
            ><i class="fas fa-fist-raised"></i
          ></a>
          <a
            data-tooltip="OSE.items.Missile"
            data-action="missileToggle"
            class="missile-toggle {{#if system.missile}}active{{/if}}"
            ><i class="fas fa-bullseye"></i
          ></a>
        </div>
        {{#if system.missile}}
        <div class="form-group block-input">
          <span class="form-label">{{localize 'OSE.items.Range'}}</span>
          <div class="form-fields range">
            <input
              type="text"
              name="system.range.short"
              value="{{system.range.short}}"
              data-dtype="Number"
            />
            <div class="sep"></div>
            <input
              type="text"
              name="system.range.medium"
              value="{{system.range.medium}}"
              data-dtype="Number"
            />
            <div class="sep"></div>
            <input
              type="text"
              name="system.range.long"
              value="{{system.range.long}}"
              data-dtype="Number"
            />
          </div>
        </div>
        {{/if}}
        <label class="form-group">
          <span class="form-label">{{localize 'OSE.spells.Save'}}</span>
          <div class="form-fields">
            <select name="system.save">
              <option value=""></option>
              {{selectOptions config.saves_short selected=system.save}}
            </select>
          </div>
        </label>
        <label class="form-group">
          <span class="form-label">{{localize 'OSE.items.Slow'}}</span>
          <div class="form-fields">
            <input
              type="checkbox"
              name="system.slow"
              {{checked
              system.slow}}
              data-dtype="Boolean"
            />
          </div>
        </label>
        <label class="form-group">
          <span class="form-label">{{localize 'OSE.items.Cost'}}</span>
          <div class="form-fields">
            <input
              type="text"
              name="system.cost"
              value="{{system.cost}}"
              data-dtype="Number"
            />
          </div>
        </label>
        {{#unless (eq @root.config.encumbrance 'itembased')}}
        <label class="form-group">
          <span class="form-label">{{localize 'OSE.items.Weight'}}</span>
          <div class="form-fields">
            <input
              type="text"
              name="system.weight"
              value="{{system.weight}}"
              data-dtype="Number"
            />
          </div>
        </label>
        {{else}}
        <label class="form-group">
          <span class="form-label" data-tooltip="OSE.items.ItemBasedEncumbranceLong" aria-label="{{localize 'OSE.items.ItemBasedEncumbranceLong'}}">
            {{localize 'OSE.items.ItemBasedEncumbrance'}}
          </span>
          <div class="form-fields">
            <input
              type="text"
              name="system.itemslots"
              value="{{system.itemslots}}"
              data-dtype="Number"
            />
          </div>
        </label>
        {{/unless}}
      </div>
      <div class="description">
        {{#if editable}}
        <prose-mirror name="system.description" toggled="true" button="true" value="{{system.description}}">{{{enriched.description}}}</prose-mirror>
        {{else}}
        <div class="editor-content">{{{enriched.description}}}</div>
        {{/if}}
      </div>
    </div>
  </section>
</div>
